schema_version: 1
model:
  model_id: Qwen/Qwen2.5-1.5B-Instruct
  revision: 989aa7980e4cf806f80c7fef2b1adb7bc71aa306
  trust_remote_code: false
  use_safetensors: true
  device: auto
  dtype: auto
  local_files_only: false
data:
  seed: 42
  pilot_size_per_domain: 120
  train_size_per_domain: 96
  validation_size_per_domain: 24
  max_length: 512
  output_dir: data/training
  benchmark_path: data/processed/benchmark.jsonl
  benchmark_manifest_path: data/processed/manifest.json
  sources:
    math:
      dataset: openai/gsm8k
      config: main
      split: train
      revision: 740312add88f781978c0658806c59bc2815b9866
    code:
      dataset: google-research-datasets/mbpp
      config: sanitized
      split: train
      revision: 4bb6404fdc6cacfda99d4ac4205087b89d32030c
    logic:
      dataset: allenai/ai2_arc
      config: ARC-Challenge
      split: train
      revision: 210d026faf9955653af8916fad021475a3f00453
    knowledge:
      dataset: hotpotqa/hotpot_qa
      config: distractor
      split: train
      revision: 1908d6afbbead072334abe2965f91bd2709910ab
lora:
  rank: 8
  alpha: 16
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  init_lora_weights: true
sft:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  learning_rate: 0.0001
  warmup_ratio: 0.1
  gradient_checkpointing: true
  completion_only_loss: true
  packing: false
  optim: adamw_torch
  lr_scheduler_type: linear
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  logging_steps: 1
  report_to: none
output:
  adapter_root: artifacts/adapters
  save_safetensors: true
  atomic_publish: true